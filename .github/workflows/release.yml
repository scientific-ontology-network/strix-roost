name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: strix-roost

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux (glibc)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: linux-gnu

          # Linux (musl)
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
            artifact: linux-musl

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: macos-x86_64

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: macos-aarch64

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: windows

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      # -----------------------------
      # Linux dependencies (fixes openssl-sys)
      # -----------------------------
      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev musl-tools

      # Allow cross-compilation for pkg-config (important for musl)
      - name: Set musl env
        if: matrix.target == 'x86_64-unknown-linux-musl'
        run: echo "PKG_CONFIG_ALLOW_CROSS=1" >> $GITHUB_ENV

      # -----------------------------
      # Build
      # -----------------------------
      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      # -----------------------------
      # Prepare artifacts
      # -----------------------------
      - name: Prepare artifact
        shell: bash
        run: |
          mkdir -p dist

          if [[ "${{ matrix.os }}" == "windows-latest" ]]; then
            cp target/${{ matrix.target }}/release/${BIN_NAME}.exe dist/
          else
            cp target/${{ matrix.target }}/release/${BIN_NAME} dist/
          fi

      # -----------------------------
      # Archive (fixed)
      # -----------------------------
      - name: Archive (Linux/macOS)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          tar czf ${BIN_NAME}-${{ matrix.artifact }}.tar.gz -C dist .

      - name: Archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Compress-Archive -Path dist\${{ env.BIN_NAME }}.exe -DestinationPath "${{ env.BIN_NAME }}-${{ matrix.artifact }}.zip"

      # -----------------------------
      # Upload artifacts
      # -----------------------------
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: |
            *.tar.gz
            *.zip

  release:
    name: Publish Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            **/*.tar.gz
            **/*.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
