[package]
name = "strix-roost"
version = "0.1.0"
edition = "2021"

[lib]
name = "strix_roost"           # Libraries cannot contain hyphens!
path = "src/lib.rs"
test = true


[[bin]]
name = "strix-roost"
path = "src/bin.rs"
test = true
bench = false

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[dependencies]
horned-owl = "1.1.0"
itertools = "0.14.0"